# nmem configuration
# Copy to nmem.toml in your project root, or ~/.config/nmem/nmem.toml
# All settings can also be set via environment variables with NMEM_ prefix.
#
# TIP: Use NmemConfig.from_profile("refinery") in Python for pre-tuned
# multi-agent defaults. See docs/profiles.md for suggested configs.

# ── Database ─────────────────────────────────────────────────────────────────
# PostgreSQL + pgvector (production):
database_url = "postgresql+asyncpg://nmem:nmem@localhost:5433/nmem"
# SQLite (quick local testing, no Docker needed):
# database_url = "sqlite+aiosqlite:///nmem.db"

# ── Embedding Provider ───────────────────────────────────────────────────────
[embedding]
provider = "sentence-transformers"   # "sentence-transformers", "openai", "noop"
model = "all-MiniLM-L6-v2"          # HuggingFace model name
device = "cpu"                       # "cpu" or "cuda" (cpu avoids GPU conflicts with LLM)
# dimensions = 384                   # Auto-detected from model, override if needed

# OpenAI embeddings (uncomment to use):
# provider = "openai"
# model = "text-embedding-3-small"
# api_key = "sk-..."
# dimensions = 1536

# ── LLM Provider (for compression + synthesis) ──────────────────────────────
[llm]
provider = "openai"                  # "openai" (OpenAI-compatible), "anthropic", "noop"
base_url = "http://localhost:11434/v1"  # Ollama, vLLM, or any OpenAI-compatible API
model = "qwen3"
# api_key = "sk-..."                 # Required for OpenAI cloud / Anthropic

# Compression settings
# compression_max_chars = 200        # Max chars for compressed content
# compression_max_tokens = 128       # Max tokens for compression LLM call
# synthesis_max_tokens = 1024        # Max tokens for nightly synthesis

# ── Journal (Tier 2) ────────────────────────────────────────────────────────
[journal]
default_expiry_days = 30             # Journal entries expire after this many days
auto_promote_importance = 7          # Auto-promote to LTM at this importance level
auto_promote_access_count = 5        # Or promote after this many accesses
# dedup_similarity_threshold = 0.92  # Cosine threshold for dedup check
# max_chars_in_prompt = 1500         # Max chars for journal in prompt injection

# ── Long-Term Memory (Tier 3) ───────────────────────────────────────────────
[ltm]
# staleness_days = 90                # Days without access before salience decay
# salience_decay_rate = 0.02         # Salience decay per consolidation cycle
# salience_decay_rate_accessed = 0.05  # Faster decay for accessed-but-unvalidated
# min_salience = 0.3                 # Floor for salience decay
# shared_promote_importance = 8      # Min importance for LTM→Shared promotion
# shared_promote_min_agents = 2      # Min distinct agents that accessed the entry
# shared_promote_min_access = 3      # Min total access count

# ── Consolidation Engine ─────────────────────────────────────────────────────
[consolidation]
enabled = true
interval_hours = 6                   # Full cycle interval
# micro_cycle_cooldown_minutes = 5   # Cooldown between micro-cycles
# nightly_synthesis_hour_utc = 23    # Hour (UTC) for nightly pattern synthesis
# nightly_synthesis_min_entries = 10  # Min journal entries to trigger synthesis
# similarity_merge_threshold = 0.85  # Cosine threshold for dedup merging

# ── Retrospective (Dreamstate) ─────────────────────────────────────────────
# Runs nightly after synthesis — validates past lessons against new evidence.
[retrospective]
enabled = true
# lookback_days = 14                 # How far back to scan for lessons (older = out of scope)
# min_lessons = 3                    # Min candidates to trigger (avoids noise on quiet days)
# max_llm_calls_per_run = 5          # LLM budget per night (~150 calls/month)
# skip_if_validated_within_days = 3  # Skip lessons validated within this window
# lesson_record_types = ["lesson", "lesson_learned"]  # LTM record_types to treat as lessons

# ── Context Threading ────────────────────────────────────────────────────────
# [clustering]
# similarity_threshold = 0.65        # Cosine threshold for context thread assignment
