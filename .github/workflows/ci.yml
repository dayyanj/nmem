name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-unit:
    name: Unit Tests (SQLite)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[cli,sqlite,mcp-server,api]"
          pip install "pytest>=8.0" "pytest-asyncio>=0.23" "pytest-cov>=5.0" "pytest-timeout>=2.0" "asgi-lifespan>=2.1"

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/integration -v --timeout=60

  test-integration:
    name: Integration Tests (PostgreSQL + pgvector)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nmem
          POSTGRES_PASSWORD: nmem
          POSTGRES_DB: nmem
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U nmem"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[cli,postgres]"
          pip install "pytest>=8.0" "pytest-asyncio>=0.23" "pytest-cov>=5.0" "pytest-timeout>=2.0"

      - name: Verify database and create pgvector extension
        run: |
          python -c "
          import asyncio, asyncpg
          async def setup():
              conn = await asyncpg.connect('postgresql://nmem:nmem@localhost:5433/nmem')
              await conn.execute('CREATE EXTENSION IF NOT EXISTS vector')
              print('pgvector extension created')
              await conn.close()
          asyncio.run(setup())
          "

      - name: Run integration tests (mock embeddings)
        env:
          NMEM_TEST_DSN: postgresql+asyncpg://nmem:nmem@localhost:5433/nmem
        run: pytest tests/integration/test_postgres.py -v --timeout=30

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[cli,sqlite]"

      - name: Check imports
        run: python -c "import nmem; print(f'nmem {nmem.__version__} imported successfully')"
